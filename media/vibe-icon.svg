<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="indigo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6DFA" />
      <stop offset="100%" stop-color="#4F3DF5" />
    </linearGradient>
    <linearGradient id="emerald-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2DD4A0" />
      <stop offset="100%" stop-color="#05A670" />
    </linearGradient>
  </defs>
  <!-- Background Shield/Badge -->
  <polygon points="50,10 85,25 85,60 50,90 15,60 15,25" fill="#141418" stroke="url(#indigo-gradient)" stroke-width="4" stroke-linejoin="round"/>
  <!-- Controller / Game Element merged with Brackets -->
  <path d="M 32,38 L 24,45 L 32,52" fill="none" stroke="url(#emerald-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 68,38 L 76,45 L 68,52" fill="none" stroke="url(#emerald-gradient)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- D-Pad central node -->
  <circle cx="50" cy="45" r="5" fill="#7C6DFA" />
  <path d="M 45,45 H 55 M 50,40 V 50" fill="none" stroke="#F0EEF8" stroke-width="2" stroke-linecap="round"/>
  <!-- Level badge / Sword shape in the bottom -->
  <path d="M 50,55 L 50,75 M 46,70 H 54" fill="none" stroke="url(#indigo-gradient)" stroke-width="3" stroke-linecap="round"/>
</svg>
